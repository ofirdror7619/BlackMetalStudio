<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .ring,
      .star,
      .horns,
      .head,
      .detail,
      .beard,
      .faint {
        fill: none;
        stroke: #a53232;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: url(#glow);
      }
      .ring { stroke-width: 6; }
      .star { stroke-width: 9; stroke: #bd3b3b; }
      .horns,
      .head { stroke-width: 4; }
      .detail,
      .beard { stroke-width: 3.5; }
      .faint { stroke-width: 2.2; opacity: 0.55; }
    </style>
  </defs>

